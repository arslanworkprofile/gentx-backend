<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop — GENTX</title>
<link href="https://fonts.googleapis.com/css2?family=News+Cycle:wght@400;700&family=Encode+Sans+Condensed:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<script src="api.js"></script>
<script src="ui.js"></script>
<style>
    * { font-family: 'News Gothic MT','News Gothic','NewsGothicMT','Encode Sans Condensed','News Cycle',sans-serif; }
.shop-wrap{max-width:1400px;margin:0 auto;padding:36px 32px 80px;display:grid;grid-template-columns:256px 1fr;gap:44px;}
/* SIDEBAR */
.sidebar{position:sticky;top:130px;align-self:start;}
.sb-title{font-family:'Futura','Futura PT','Century Gothic','Jost',sans-serif;font-size:22px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;margin-bottom:24px;padding-bottom:10px;border-bottom:3px solid #e00;}
.sb-section{margin-bottom:28px;}
.sb-label{font-family:'Futura','Futura PT','Century Gothic','Jost',sans-serif;font-size:12px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:#999;margin-bottom:12px;}
input[type=range]{width:100%;accent-color:#e00;height:4px;}
.price-disp{font-size:13px;color:#666;margin-top:7px;}
.price-disp strong{color:#e00;font-weight:700;}
.filter-checks{display:flex;flex-direction:column;gap:9px;}
.fcheck{display:flex;align-items:center;gap:9px;cursor:pointer;}
.fcheck input[type=checkbox]{accent-color:#e00;width:14px;height:14px;cursor:pointer;}
.fcheck label{font-size:13px;color:#555;cursor:pointer;transition:color .2s;}
.fcheck:hover label{color:#e00;}
.clear-btn{display:block;width:100%;padding:10px;background:transparent;border:2px solid #111;font-family:'Futura','Futura PT','Century Gothic','Jost',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;transition:all .25s;border-radius:2px;margin-top:6px;}
.clear-btn:hover{background:#e00;border-color:#e00;color:#fff;}
/* PRODUCTS AREA */
.prod-area{}
.shop-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid #e8e8e8;flex-wrap:wrap;gap:10px;}
.results-info{font-size:13px;color:#999;}
.results-info strong{color:#111;font-weight:700;}
.sort-sel{border:1px solid #e0e0e0;padding:8px 12px;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;border-radius:2px;}
.sort-sel:focus{border-color:#e00;}
.cat-pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:22px;}
.pill{padding:7px 16px;border:2px solid #e0e0e0;background:none;font-family:'Futura','Futura PT','Century Gothic','Jost',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#888;border-radius:2px;transition:all .2s;cursor:pointer;}
.pill:hover,.pill.active{border-color:#e00;color:#e00;background:rgba(220,0,0,.05);}
/* mobile sidebar toggle */
.mob-filter-btn{display:none;align-items:center;gap:8px;padding:9px 18px;border:2px solid #111;background:none;font-family:'Futura','Futura PT','Century Gothic','Jost',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border-radius:2px;transition:all .2s;}
.mob-filter-btn:hover{background:#111;color:#fff;}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:490;opacity:0;visibility:hidden;transition:.3s;}
.sidebar-overlay.open{opacity:1;visibility:visible;}
@media(max-width:900px){
  .shop-wrap{grid-template-columns:1fr;gap:20px;}
  .sidebar{position:fixed;top:0;left:-290px;width:270px;height:100vh;overflow-y:auto;background:#fff;z-index:500;padding:24px 20px;transition:left .35s ease;box-shadow:5px 0 30px rgba(0,0,0,.15);border-right:3px solid #e00;}
  .sidebar.open{left:0;}
  .mob-filter-btn{display:flex;}
}
@media(max-width:600px){.shop-wrap{padding:24px 16px 60px;}}
</style>

<div class="gx-page-header">
  <h1>Our <span>Shop</span></h1>
  <div class="gx-breadcrumb"><a href="index.html">Home</a> / Shop</div>
</div>

<main>
<div class="shop-wrap">
  <!-- SIDEBAR -->
  <div class="sidebar-overlay" id="sb-overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sb-title">Filters</div>
    <div class="sb-section">
      <div class="sb-label">Price Range</div>
      <input type="range" min="1000" max="100000" value="9000" id="price-range" oninput="applyFilters()">
      <div class="price-disp">Up to: <strong>PKR <span id="price-val">9,000</span></strong></div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Category</div>
      <div class="filter-checks" id="cat-checks"></div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Status</div>
      <div class="filter-checks">
        <div class="fcheck"><input type="checkbox" id="f-sale" onchange="applyFilters()"><label for="f-sale">On Sale</label></div>
        <div class="fcheck"><input type="checkbox" id="f-new" onchange="applyFilters()"><label for="f-new">New Arrivals</label></div>
        <div class="fcheck"><input type="checkbox" id="f-featured" onchange="applyFilters()"><label for="f-featured">Featured</label></div>
      </div>
    </div>
    <button class="clear-btn" onclick="clearFilters()">Clear All Filters</button>
  </aside>

  <!-- PRODUCTS -->
  <div class="prod-area">
    <div class="shop-bar">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <button class="mob-filter-btn" onclick="openSidebar()">⚙ Filters</button>
        <div class="results-info">Showing <strong id="result-count">0</strong> products</div>
      </div>
      <select class="sort-sel" id="sort-sel" onchange="applyFilters()">
        <option value="default">Sort: Default</option>
        <option value="low">Price: Low → High</option>
        <option value="high">Price: High → Low</option>
        <option value="newest">Newest First</option>
        <option value="name">A → Z</option>
      </select>
    </div>
    <div class="cat-pills" id="cat-pills"></div>
    <div class="gx-grid cols-3" id="shop-grid"></div>
  </div>
</div>
</main>

<footer class="gx-footer">
  <div class="gx-footer-grid">
    <div><div class="gx-flogo">GENT<span>X</span></div><p class="gx-ftxt">Modern fashion for confident men.</p><div class="gx-fsocials"><a class="gx-fsoc" href="#">FB</a><a class="gx-fsoc" href="#">IG</a><a class="gx-fsoc" href="#">TW</a></div></div>
    <div><div class="gx-fcol-t">Quick Links</div><ul class="gx-flinks"><li><a href="index.html">Home</a></li><li><a href="shop.html">Shop</a></li><li><a href="contact.html">Contact</a></li></ul></div>
    <div><div class="gx-fcol-t">Categories</div><ul class="gx-flinks" id="gx-footer-cats"></ul></div>
    <div><div class="gx-fcol-t">Subscribe</div><div class="gx-fnews"><input type="email" id="gx-news-email" placeholder="Your email"><button onclick="GentXUI.subscribe()">JOIN</button></div></div>
  </div>
  <div class="gx-fbot"><p>© 2026 GENTX. All Rights Reserved.</p><div class="gx-fleg"><a href="privacy.html">Privacy</a><a href="terms.html">Terms</a></div></div>
</footer>

<script>
GentXUI.init('shop');

let activeCat = 'all';
let cats = [];
let allProducts = [];

// (initialized in initShop)

function setCat(slug, btn) {
  activeCat = slug;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  // uncheck sidebar cats
  cats.forEach(c => { const el = document.getElementById('fc-'+c.slug); if(el) el.checked=false; });
  applyFilters();
}

async function applyFilters() {
  const priceMax = parseInt(document.getElementById('price-range').value) || 999999;
  document.getElementById('price-val').textContent = priceMax.toLocaleString();
  const saleF     = document.getElementById('f-sale')?.checked;
  const newF      = document.getElementById('f-new')?.checked;
  const featF     = document.getElementById('f-featured')?.checked;
  const sort      = document.getElementById('sort-sel').value;

  // checked categories from sidebar
  const checkedCats = cats.filter(c=>document.getElementById('fc-'+c.slug)?.checked).map(c=>c.slug);

  let prods = [...allProducts];
  if (activeCat !== 'all')    prods = prods.filter(p=>p.category===activeCat);
  if (checkedCats.length)     prods = prods.filter(p=>checkedCats.includes(p.category));
  prods = prods.filter(p=>p.price<=priceMax);
  if (saleF)  prods = prods.filter(p=>p.badge==='SALE'||p.oldPrice);
  if (newF)   prods = prods.filter(p=>p.badge==='NEW');
  if (featF)  prods = prods.filter(p=>p.featured);

  // sort
  if (sort==='low')    prods.sort((a,b)=>a.price-b.price);
  else if(sort==='high')   prods.sort((a,b)=>b.price-a.price);
  else if(sort==='newest') prods.sort((a,b)=>(b.created_at||b.createdAt||'').localeCompare(a.created_at||a.createdAt||''));
  else if(sort==='name')   prods.sort((a,b)=>a.name.localeCompare(b.name));

  // handle URL search query
  const q = new URLSearchParams(location.search).get('q')?.toLowerCase();
  if (q) prods = prods.filter(p=>p.name.toLowerCase().includes(q)||p.category.includes(q));

  document.getElementById('result-count').textContent = prods.length;
  GentXUI.renderProductGrid(prods, 'shop-grid');
  closeSidebar();
}

function clearFilters() {
  activeCat = 'all';
  document.getElementById('price-range').value = 100000;
  document.getElementById('price-val').textContent = '100,000';
  ['f-sale','f-new','f-featured'].forEach(id=>{ const el=document.getElementById(id); if(el) el.checked=false; });
  cats.forEach(c=>{ const el=document.getElementById('fc-'+c.slug); if(el) el.checked=false; });
  document.querySelectorAll('.pill').forEach((p,i)=>p.classList.toggle('active',i===0));
  document.getElementById('sort-sel').value = 'default';
  applyFilters();
}

function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('sb-overlay').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sb-overlay').classList.remove('open'); }

async function initShop() {
  cats = (await GentXDB.getCategories()).filter(c=>c.active);
  allProducts = await GentXDB.getProducts();
  // Category checkboxes
  document.getElementById('cat-checks').innerHTML = cats.map(c =>
    `<div class="fcheck"><input type="checkbox" id="fc-${c.slug}" onchange="applyFilters()"><label for="fc-${c.slug}">${c.name}</label></div>`
  ).join('');
  document.getElementById('cat-pills').innerHTML =
    `<button class="pill active" onclick="setCat('all',this)">All</button>` +
    cats.map(c=>`<button class="pill" onclick="setCat('${c.slug}',this)">${c.name}</button>`).join('');
  await applyFilters();
}


initShop();
</script></body>
</html>
